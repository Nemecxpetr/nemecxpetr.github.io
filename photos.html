<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photos - Petr Nemec</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ffcf33;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      line-height: 1.6;
    }

    main {
      width: 100%;
      padding: 1rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin: 0 0 1rem;
    }

    .back-link {
      flex: 0 0 auto;
      font-size: clamp(0.8rem, 2.4vw, 0.95rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .photo-list {
      column-width: clamp(220px, 30vw, 360px);
      column-gap: 0.0rem;
      width: 100%;
      line-height: 0;
    }

    .photo-link {
      position: relative;
      display: inline-block;
      width: 100%;
      margin: 0 0 0.0rem;
      break-inside: avoid;
      line-height: 0;
      vertical-align: top;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .photo-credit {
      position: absolute;
      left: 0.4rem;
      bottom: 0.4rem;
      z-index: 1;
      line-height: 1.3;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      color: #ffcf33;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.15rem 0.4rem;
      pointer-events: none;
      white-space: nowrap;
    }

    .viewer-credit {
      position: absolute;
      left: 0.6rem;
      bottom: 0.6rem;
      z-index: 2;
      line-height: 1.3;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      color: #ffcf33;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.2rem 0.5rem;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(255, 255, 0, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .viewer[aria-hidden="false"] {
      display: flex;
    }

    .viewer img {
      width: auto;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 2rem);
    }

    .viewer-frame {
      position: relative;
      line-height: 0;
    }

    .viewer-close {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      margin: 0;
      padding: 0.25rem 0.35rem;
      border: 0;
      background: transparent;
      color: #ffcf33;
      font: inherit;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
    }

    @media (min-width: 900px) {
      .photo-list {
        column-width: clamp(260px, 28vw, 360px);
      }
    }

    .status {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: clamp(0.95rem, 2.6vw, 1rem);
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <h1>Photos - Petr Němec</h1>
      <a class="back-link" href="index.html" data-close-tab>Back</a>
    </header>
    <p id="status" class="status">Loading...</p>
    <div id="photo-list" class="photo-list" hidden></div>
  </main>
  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-frame">
      <button id="viewer-close" class="viewer-close" type="button" aria-label="Close">x</button>
      <img id="viewer-image" alt="" />
      <span id="viewer-credit" class="viewer-credit" hidden></span>
    </div>
  </div>

  <script>
    const manifestUrl = "assets/promo/manifest.json";
    const imageBase = "assets/promo/";
    const status = document.getElementById("status");
    const list = document.getElementById("photo-list");
    const viewer = document.getElementById("viewer");
    const viewerImage = document.getElementById("viewer-image");
    const viewerCredit = document.getElementById("viewer-credit");
    const viewerClose = document.getElementById("viewer-close");
    const creditBySrc = new Map();

    document.querySelector("[data-close-tab]")?.addEventListener("click", (event) => {
      event.preventDefault();
      window.close();
      window.setTimeout(() => {
        window.location.href = "index.html";
      }, 120);
    });

    function validPhotoName(value) {
      return typeof value === "string" && value.trim() && !value.includes("/") && !value.includes("\\");
    }

    // Manifest entries may be a plain filename string, or an object
    // like {"file": "name.jpg", "credit": "@photographer"} when a
    // photo should carry a photographer credit tag.
    function normalizeEntry(entry) {
      if (typeof entry === "string") {
        return { file: entry, credit: "" };
      }
      if (entry && typeof entry === "object" && validPhotoName(entry.file)) {
        const credit = typeof entry.credit === "string" ? entry.credit.trim() : "";
        return { file: entry.file, credit };
      }
      return null;
    }

    function shuffle(values) {
      const result = [...values];
      for (let index = result.length - 1; index > 0; index -= 1) {
        const nextIndex = Math.floor(Math.random() * (index + 1));
        const current = result[index];
        result[index] = result[nextIndex];
        result[nextIndex] = current;
      }
      return result;
    }

    async function loadPhotos() {
      const response = await fetch(manifestUrl, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(String(response.status));
      }

      const rawEntries = await response.json();
      const entries = shuffle(rawEntries.map(normalizeEntry).filter(Boolean));
      if (!entries.length) {
        status.textContent = "No photos available.";
        return;
      }

      for (const entry of entries) {
        const src = imageBase + entry.file;
        if (entry.credit) {
          creditBySrc.set(src, entry.credit);
        }

        const link = document.createElement("a");
        link.className = "photo-link";
        link.href = src;
        link.dataset.photoSrc = src;

        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "lazy";
        img.decoding = "async";

        link.appendChild(img);

        if (entry.credit) {
          const creditTag = document.createElement("span");
          creditTag.className = "photo-credit";
          creditTag.textContent = entry.credit;
          link.appendChild(creditTag);
        }

        list.appendChild(link);
      }

      status.hidden = true;
      list.hidden = false;
    }

    loadPhotos().catch(() => {
      status.textContent = "Photo list unavailable.";
    });

    function closeViewer() {
      viewer.setAttribute("aria-hidden", "true");
      viewerImage.removeAttribute("src");
      viewerCredit.hidden = true;
      viewerCredit.textContent = "";
    }

    function openViewer(src, updateHistory) {
      viewerImage.src = src;
      viewer.setAttribute("aria-hidden", "false");

      const credit = creditBySrc.get(src) || "";
      viewerCredit.textContent = credit;
      viewerCredit.hidden = !credit;

      if (updateHistory) {
        history.pushState({ photo: src }, "", "#" + encodeURIComponent(src));
      }
    }

    list.addEventListener("click", (event) => {
      const link = event.target.closest("[data-photo-src]");
      if (!link) {
        return;
      }
      event.preventDefault();
      openViewer(link.dataset.photoSrc, true);
    });

    viewer.addEventListener("click", () => {
      if (history.state && history.state.photo) {
        history.back();
      } else {
        closeViewer();
      }
    });

    viewerClose.addEventListener("click", (event) => {
      event.stopPropagation();
      if (history.state && history.state.photo) {
        history.back();
      } else {
        closeViewer();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key !== "Escape" || viewer.getAttribute("aria-hidden") !== "false") {
        return;
      }

      if (history.state && history.state.photo) {
        history.back();
      } else {
        closeViewer();
      }
    });

    window.addEventListener("popstate", (event) => {
      if (event.state && event.state.photo) {
        openViewer(event.state.photo, false);
      } else {
        closeViewer();
      }
    });
  </script>
</body>
</html>
