<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bio — Petr Němec</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ffcf33;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      line-height: 1.6;
    }

    main {
      width: 100%;
      padding: 1rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin: 0 0 0.25rem;
    }

    .back-link {
      flex: 0 0 auto;
      font-size: clamp(0.8rem, 2.4vw, 0.95rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bio-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: clamp(0.95rem, 2.6vw, 1rem);
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <h1>
        <a href="assets/bio.txt" download="bio.txt">
          Bio - petr němec
        </a>
      </h1>
      <a class="back-link" href="index.html" data-close-tab>Back</a>
    </header>
    <pre id="bio-content" class="bio-text">Loading…</pre>
  </main>

  <script>
    const target = document.getElementById("bio-content");
    const candidates = ["assets/bio.txt", "bio.txt"];

    document.querySelector("[data-close-tab]")?.addEventListener("click", (event) => {
      event.preventDefault();
      window.close();
      window.setTimeout(() => {
        window.location.href = "index.html";
      }, 120);
    });

    function decodeBytes(buffer) {
      const encodings = ["utf-8", "windows-1250", "iso-8859-2", "latin2"];

      for (const encoding of encodings) {
        try {
          const decoder = new TextDecoder(encoding, { fatal: true });
          return decoder.decode(buffer);
        } catch (_) {}
      }

      return new TextDecoder("utf-8").decode(buffer);
    }

    async function loadBio() {
      for (const path of candidates) {
        try {
          const response = await fetch(path, { cache: "no-store" });
          if (response.ok) {
            const buffer = await response.arrayBuffer();
            return decodeBytes(buffer);
          }
        } catch (_) {}
      }
      return null;
    }

    loadBio().then((text) => {
      target.textContent = text ? text.trim() || "No bio available." : "Bio unavailable.";
    });
  </script>
</body>
</html>
